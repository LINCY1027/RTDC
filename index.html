<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" id="themeColorMeta" content="#000000">
    <title>RTDC工程相機</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            color-scheme: dark; 
            --bg-main: #000000;
            --bg-panel: #1c1c1e;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --input-bg: #2c2c2e;
            --input-border: #3a3a3c;
            --seg-active: #636366;
            --modal-bg: #2c2c2e;
        }

        body.light-theme {
            color-scheme: light; 
            --bg-main: #e5e5ea;
            --bg-panel: #ffffff;
            --text-main: #000000;
            --text-muted: #666666;
            --input-bg: #f2f2f7;
            --input-border: #d1d1d6;
            --seg-active: #ffffff;
            --modal-bg: #f2f2f7;
        }

        option { background-color: var(--input-bg); color: var(--text-main); }

        body { 
            font-family: "微軟正黑體", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; background: var(--bg-main); color: var(--text-main); 
            user-select: none; display: flex; flex-direction: column; height: 100dvh; 
            width: 100vw; max-width: 100%; overflow-x: hidden; 
            overscroll-behavior-y: none; transition: background 0.4s ease;
        }

        #ptrIndicator { position: absolute; top: 0; left: 0; width: 100%; height: 70px; display: flex; justify-content: center; align-items: center; color: var(--text-muted); font-size: 14px; font-weight: bold; z-index: 1; }

        #appContainer { display: flex; flex-direction: column; height: 100dvh; width: 100vw; position: relative; z-index: 2; background: var(--bg-main); animation: appFadeIn 0.5s ease-out; transition: background 0.4s ease; }
        @keyframes appFadeIn { from { opacity: 0; } to { opacity: 1; } }

        #cameraSection { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; width: 100%; }
        .top-bar { position: absolute; top: 15px; width: 100%; padding: 0 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        
        .fab-settings { background: rgba(0, 0, 0, 0.4); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 15px; font-size: 15px; font-weight: bold; border-radius: 20px; backdrop-filter: blur(8px); cursor: pointer; transition: transform 0.2s; }
        .fab-settings:active { transform: scale(0.92); }
        
        .export-group { display: flex; gap: 8px; }
        .export-btn { background: #FF3B30; color: #fff; border: none; padding: 8px 12px; font-size: 14px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .export-btn.excel { background: #107c41; color: #fff; } 
        .export-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .video-container { width: 100%; aspect-ratio: 4 / 3; background: #111; position: relative; overflow: hidden; }
        #videoElement { width: 100%; height: 100%; object-fit: cover; }

        #displayOverlay { position: absolute; left: 0; width: 100%; background: rgba(0, 0, 0, 0.5); padding: 8px 10px; box-sizing: border-box; font-weight: bold; pointer-events: none; line-height: 1.4; transition: top 0.4s, bottom 0.4s; word-wrap: break-word; white-space: normal; }

        #controlPanel { background: var(--bg-panel); border-radius: 0; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 -4px 20px rgba(0,0,0,0.3); z-index: 30; animation: panelSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes panelSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .pos-input-row { display: flex; gap: 8px; width: 100%; }
        .prefix-box, .axis-box { display: flex; align-items: center; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px; transition: 0.3s; }
        .prefix-box { flex: 1; } .axis-box { flex: 2; justify-content: center; }
        .prefix-box .prefix { padding-left: 10px; font-weight: bold; color: #007AFF; font-size: 16px; }
        .prefix-box input, .axis-box input { flex: 1; width: 0; min-width: 0; background: transparent; color: var(--text-main); border: none; padding: 12px 0; font-size: 16px; font-weight: bold; outline: none; text-align: center !important; }
        .prefix-box input { padding-left: 5px; text-align: left !important; }
        .axis-box .pos-separator { font-size: 18px; font-weight: bold; color: var(--text-muted); margin: 0 5px; }
        #posEng { text-transform: uppercase; }

        .remark-input { width: 100%; background: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border); padding: 10px; border-radius: 8px; font-size: 16px; font-weight: bold; text-align: center; outline: none; }

        .segmented-control { display: flex; background: var(--input-bg); border-radius: 8px; padding: 4px; gap: 4px; }
        .seg-btn { flex: 1; border: none; background: transparent; padding: 8px 0; font-size: 14px; border-radius: 6px; cursor: pointer; color: var(--text-main); font-weight: bold; transition: 0.3s; }
        .seg-btn.active { background: var(--seg-active); color: #FFD60A; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .light-theme .seg-btn.active { color: #007AFF; }

        .zoom-row { display: flex; align-items: center; justify-content: center; gap: 15px; color: var(--text-muted); font-size: 14px; }
        input[type=range] { flex: 1; accent-color: #FFD60A; }
        
        .shutter-row { display: flex; justify-content: center; align-items: center; position: relative; margin-top: 5px; height: 65px; }
        .side-btn { 
            position: absolute; height: 40px; padding: 0 15px; border-radius: 20px; 
            background: var(--input-bg); border: 1px solid var(--input-border); 
            color: var(--text-main); font-size: 14px; font-weight: bold; 
            cursor: pointer; display: flex; justify-content: center; align-items: center; 
            transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
        }
        .side-btn.left { left: 10px; }
        .side-btn.right { right: 10px; }
        .side-btn:active { transform: scale(0.9); background: var(--seg-active); }
        .side-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        
        .shutter-btn { width: 65px; height: 65px; border-radius: 50%; background: white; border: 4px solid #8e8e93; cursor: pointer; box-shadow: 0 0 0 4px white inset; transition: transform 0.15s; }
        .shutter-btn:active { transform: scale(0.88); }

        .company-footer { text-align: center; font-size: 8px; color: var(--text-muted); line-height: 1.4; margin-top: 15px; opacity: 0.6; }

        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 100; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); animation: modalBgFadeIn 0.3s ease; }
        @keyframes modalBgFadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .settings-content, .help-content { background: var(--modal-bg); color: var(--text-main); width: 85%; max-width: 350px; max-height: 85vh; overflow-y: auto; border-radius: 16px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .help-content { white-space: pre-wrap; line-height: 1.6; font-size: 14px; }
        @keyframes popIn { from { transform: scale(0.85) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        
        .input-group { background: var(--input-bg); border-radius: 10px; padding: 10px 15px; margin-bottom: 12px; }
        .input-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; font-weight: bold; }
        .input-group select, .input-group input[type="text"], .input-group input[type="number"] { width: 100%; border: none; font-size: 16px; font-weight:bold; color: var(--text-main); outline: none; background: transparent; }
        .toggle-group { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; font-size: 12px; }
        
        .modal-btn-done { background: #007AFF; color: white; border: none; width: 100%; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 10px; }
        .modal-btn-info { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border); width: 100%; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 10px; }
        .modal-btn-danger { background: #FF3B30; color: white; border: none; width: 100%; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 10px; }

        .map-content { background: var(--bg-main); width: 100%; height: 100%; display: flex; flex-direction: column; animation: slideUpMap 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUpMap { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .map-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-panel); border-bottom: 1px solid var(--input-border); z-index: 10; }
        .map-header h3 { margin: 0; font-size: 18px; color: var(--text-main); }
        #mapFloorSelector { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border); border-radius: 8px; padding: 5px 10px; outline: none; font-weight: bold; font-size: 14px; }
        .map-canvas-container { flex: 1; position: relative; background: var(--bg-main); overflow: hidden; touch-action: none; } 
        #mapCanvas { width: 100%; height: 100%; display: block; touch-action: none; }

        #canvas { display: none; }
    </style>
</head>
<body>

    <div id="ptrIndicator"><span id="ptrIcon">↓</span>&nbsp;<span id="ptrText">下拉以重新載入...</span></div>

    <div id="appContainer">
        <div id="cameraSection">
            <div class="top-bar">
                <button class="fab-settings" id="uiBtnSettings" onclick="openSettings()">設定</button>
                <div class="export-group">
                    <button class="export-btn" id="uiBtnExport" onclick="exportPDF()" disabled>PDF (0)</button>
                    <button class="export-btn excel" id="uiBtnExportExcel" onclick="exportTrueExcel()" disabled>EXCEL</button>
                </div>
            </div>
            <div class="video-container">
                <video id="videoElement" autoplay playsinline muted></video>
                <div id="displayOverlay"></div>
            </div>
        </div>

        <div id="controlPanel">
            <div class="pos-input-row">
                <div class="prefix-box"><span class="prefix">L</span><input type="number" id="posFloor" placeholder="樓層" min="1"></div>
                <div class="axis-box"><input type="text" id="posEng" placeholder="英文"><span class="pos-separator">/</span><input type="number" id="posNum" placeholder="數字" step="any" min="0.1"></div>
            </div>
            <input type="text" id="remarkInput" class="remark-input" placeholder="備註 (選填)">
            
            <div class="segmented-control" id="directionControl">
                <button class="seg-btn active" id="dirNone" onclick="setDirection('none')">無</button>
                <button class="seg-btn" id="dirE" onclick="setDirection('E')">東</button>
                <button class="seg-btn" id="dirW" onclick="setDirection('W')">西</button>
                <button class="seg-btn" id="dirS" onclick="setDirection('S')">南</button>
                <button class="seg-btn" id="dirN" onclick="setDirection('N')">北</button>
                <button class="seg-btn" id="dirC" onclick="setDirection('C')">中</button>
            </div>

            <div class="zoom-row"><span>1x</span><input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="1"><span>3x</span></div>
            
            <div class="shutter-row">
                <button class="side-btn left" id="uiBtnMap" onclick="openMap()">平面圖</button>
                <button class="shutter-btn" onclick="takePicture()"></button>
                <button class="side-btn right" id="uiBtnUndo" onclick="deleteLastPhoto()" disabled>刪除</button>
            </div>
            
            <div class="company-footer">
                潤泰集團 RUENTEX 潤弘精密工程事業股份有限公司<br>
                RTDC Designed by LINCY V1.0 | E-mail: RT023078@mail.ruentex.com.tw
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay">
        <div class="settings-content">
            <div class="modal-title" id="uiModalTitle" style="text-align:center; font-weight:bold; margin-bottom:15px;">系統與平面圖設定</div>
            
            <div class="input-group">
                <label id="lblUser">拍攝者</label>
                <input type="text" id="userName" placeholder="請輸入姓名..." oninput="updateWatermarkPreview()">
                <div class="toggle-group" style="margin-top:10px; border-top:1px solid var(--input-border); padding-top:10px;">
                    <span id="lblShowUser">顯示於浮水印</span>
                    <input type="checkbox" id="showUserInWM" checked onchange="updateWatermarkPreview()">
                </div>
            </div>

            <div class="input-group">
                <label id="lblMapSpan">網格垮距 (m)</label>
                <input type="number" id="mapSpan" value="11" min="1" onchange="if(mapIsOpen) renderMap()">
            </div>
            <div class="input-group">
                <label id="lblMapCol">柱子大小 (m)</label>
                <input type="number" id="mapColSize" value="1" min="0.1" step="0.1" onchange="if(mapIsOpen) renderMap()">
            </div>

            <div class="input-group">
                <label id="lblLang">介面語言</label>
                <select id="sysLang" onchange="applyLanguage()">
                    <option value="zh" id="optLangZh">繁體中文</option>
                    <option value="en" id="optLangEn">English</option>
                </select>
            </div>
            <div class="input-group">
                <label id="lblTheme">風格主題</label>
                <select id="sysTheme" onchange="applyTheme()">
                    <option value="dark" id="optThemeDark">深色模式</option>
                    <option value="light" id="optThemeLight">淺色模式</option>
                </select>
            </div>
            
            <div class="input-group">
                <label id="lblColor">浮水印顏色</label>
                <select id="wmColor" onchange="updateWatermarkPreview()">
                    <option value="#FFD60A" id="optColorYellow">黃色</option>
                    <option value="#FFFFFF" id="optColorWhite">白色</option>
                    <option value="#FF453A" id="optColorRed">紅色</option>
                    <option value="#32D74B" id="optColorGreen">綠色</option>
                </select>
            </div>
            <div class="input-group">
                <label id="lblSize">浮水印大小</label>
                <input type="range" id="wmSize" style="width:100%;" min="0.6" max="1.5" step="0.1" value="1.0" oninput="updateWatermarkPreview()">
            </div>
            <div class="input-group">
                <label id="lblPos">浮水印位置</label>
                <select id="wmPosition" onchange="updateWatermarkPreview()">
                    <option value="bottom" id="optPosBot">相片底部</option>
                    <option value="top" id="optPosTop">相片頂部</option>
                </select>
            </div>
            
            <hr style="border: 0; height: 1px; background: var(--input-border); margin: 15px 0;">
            <button class="modal-btn-info" id="uiBtnHelp" onclick="openHelp()">使用說明</button>
            <button class="modal-btn-danger" id="uiBtnClear" onclick="manualClearAll()">清空所有紀錄</button>
            <button class="modal-btn-done" id="uiBtnDone" onclick="closeSettings()">完成</button>
        </div>
    </div>

    <div id="helpModal" class="modal-overlay">
        <div class="help-content">
            <div class="modal-title" id="uiHelpTitle" style="text-align:center; font-weight:bold; margin-bottom:15px; font-size:18px;">使用說明</div>
            <div id="uiHelpContent" style="margin-bottom: 20px; color: var(--text-muted);"></div>
            <button class="modal-btn-done" id="uiBtnCloseHelp" onclick="closeHelp()">我知道了</button>
        </div>
    </div>

    <div id="mapModal" class="modal-overlay">
        <div class="map-content">
            <div class="map-header">
                <button class="fab-settings" id="uiBtnCloseMap" onclick="closeMap()">關閉</button>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <h3 id="uiMapTitle" style="margin:0;">缺失平面圖</h3>
                    <select id="mapFloorSelector" onchange="renderMap()"></select>
                </div>
            </div>
            <div class="map-canvas-container">
                <canvas id="mapCanvas"></canvas>
            </div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

<script>
    const i18n = {
        zh: {
            uiBtnSettings: "設定", uiBtnExport: "PDF", uiBtnExportExcel: "EXCEL", uiBtnMap: "平面圖", uiBtnUndo: "刪除",
            phFloor: "樓層", phNum: "數字", phEng: "英文", phRemark: "備註 (選填)", phUser: "請輸入姓名...",
            dirNone: "無", dirE: "東", dirW: "西", dirS: "南", dirN: "北", dirC: "中",
            ptrPull: "下拉以重新載入...", ptrRelease: "釋放以重新載入", ptrLoading: "載入中...",
            uiModalTitle: "系統與平面圖設定", lblUser: "拍攝者", lblShowUser: "顯示於浮水印", 
            lblMapSpan: "網格垮距 (m)", lblMapCol: "柱子大小 (m)",
            lblLang: "介面語言", optLangZh: "繁體中文", optLangEn: "English",
            lblTheme: "風格主題", optThemeDark: "深色模式", optThemeLight: "淺色模式", 
            lblColor: "浮水印顏色", optColorYellow: "黃色", optColorWhite: "白色", optColorRed: "紅色", optColorGreen: "綠色",
            lblSize: "浮水印大小", lblPos: "浮水印位置", optPosBot: "相片底部", optPosTop: "相片頂部", 
            uiBtnHelp: "使用說明", uiBtnClear: "清空所有紀錄", uiBtnDone: "完成",
            noPos: "未輸入位置", confirmNoPos: "您尚未輸入完整位置，確定要直接拍照嗎？", reportTitle: "現場巡察報告", alertExport: "報表已成功產出！請問是否要清空目前的紀錄？",
            colNo: "項次", colImg: "現場照片", colFloor: "樓層", colAxis: "軸線", colDir: "方位", colUser: "拍攝者", colRemark: "備註", colTime: "時間",
            uiMapTitle: "缺失平面圖", uiBtnCloseMap: "關閉", confirmDelete: "確定要刪除「上一張」照片紀錄嗎？\n資料將從資料庫中永久移除。",
            confirmManualClear: "警告：這將會永久刪除所有已拍攝的紀錄與照片！\n確定要清空嗎？",
            mapAllFloors: "全部樓層", noMapData: "無有效座標可繪製",
            uiHelpTitle: "使用說明", uiBtnCloseHelp: "我知道了",
            uiHelpContent: "1. 輸入樓層與軸線(英文/數字)\n2. 選擇拍攝方位與填寫備註\n3. 按下快門，照片將自動壓印浮水印並儲存\n4. 點擊「平面圖」可檢視帶有照片與引線的座標分佈\n5. 在「設定」中可自定義平面圖的垮距與柱子大小\n6. 點擊「刪除」可快速撤銷上一張照片\n7. 點擊頂部可匯出 PDF 或 原生 EXCEL 報表 (包含平面圖)"
        },
        en: {
            uiBtnSettings: "Settings", uiBtnExport: "PDF", uiBtnExportExcel: "EXCEL", uiBtnMap: "Plan", uiBtnUndo: "Delete",
            phFloor: "Floor", phNum: "Num", phEng: "Eng", phRemark: "Remark (Optional)", phUser: "Enter name...",
            dirNone: "None", dirE: "E", dirW: "W", dirS: "S", dirN: "N", dirC: "C",
            ptrPull: "Pull down to refresh...", ptrRelease: "Release to refresh", ptrLoading: "Loading...",
            uiModalTitle: "System & Plan Settings", lblUser: "Photographer", lblShowUser: "Show in WM", 
            lblMapSpan: "Grid Span (m)", lblMapCol: "Column Size (m)",
            lblLang: "Language", optLangZh: "繁體中文", optLangEn: "English",
            lblTheme: "Theme", optThemeDark: "Dark Mode", optThemeLight: "Light Mode", 
            lblColor: "WM Color", optColorYellow: "Yellow", optColorWhite: "White", optColorRed: "Red", optColorGreen: "Green",
            lblSize: "WM Size", lblPos: "WM Position", optPosBot: "Bottom", optPosTop: "Top", 
            uiBtnHelp: "User Manual", uiBtnClear: "Clear All Records", uiBtnDone: "Done",
            noPos: "No Location", confirmNoPos: "Incomplete info, take photo anyway?", reportTitle: "Site Inspection Report", alertExport: "Report exported! Clear current records?",
            colNo: "No.", colImg: "Photo", colFloor: "Floor", colAxis: "Axis", colDir: "Direction", colUser: "Photographer", colRemark: "Remark", colTime: "Time",
            uiMapTitle: "Defect Plan", uiBtnCloseMap: "Close", confirmDelete: "Delete the LAST photo?\nThis action cannot be undone.",
            confirmManualClear: "Warning: This will permanently delete ALL records and photos!\nAre you sure?",
            mapAllFloors: "All Floors", noMapData: "No valid coordinates",
            uiHelpTitle: "User Manual", uiBtnCloseHelp: "Got it",
            uiHelpContent: "1. Enter Floor and Axis (Eng/Num)\n2. Select Direction & add Remark\n3. Tap shutter to save photo with watermark\n4. Use 'Plan' to view photo distribution with leader lines\n5. Customize grid span and column size in Settings\n6. Tap 'Delete' to undo the last photo\n7. Export PDF or EXCEL reports (Plan included) from top bar"
        }
    };

    const displayOverlay = document.getElementById('displayOverlay'), video = document.getElementById('videoElement'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const posFloor = document.getElementById('posFloor'), posNum = document.getElementById('posNum'), posEng = document.getElementById('posEng'), remarkInput = document.getElementById('remarkInput');
    const sysLang = document.getElementById('sysLang'), sysTheme = document.getElementById('sysTheme');
    const wmColor = document.getElementById('wmColor'), wmSize = document.getElementById('wmSize'), wmPosition = document.getElementById('wmPosition');
    const exportBtn = document.getElementById('uiBtnExport'), exportBtnExcel = document.getElementById('uiBtnExportExcel');
    const userName = document.getElementById('userName'), showUserInWM = document.getElementById('showUserInWM');
    const appContainer = document.getElementById('appContainer'), ptrIndicator = document.getElementById('ptrIndicator'), ptrIcon = document.getElementById('ptrIcon'), ptrText = document.getElementById('ptrText');
    const btnUndo = document.getElementById('uiBtnUndo');

    let db, inspectionRecords = [], currentZoom = 1, currentDirKey = "none", touchStartY = 0, currentDeltaY = 0, isPulling = false;
    let mapIsOpen = false, mapZoom = 1, mapPanX = 0, mapPanY = 0;
    let isMapDragging = false, mapStartX = 0, mapStartY = 0, initialPinchDist = null, initialZoom = 1;

    function loadImageAsync(src) {
        return new Promise(resolve => {
            const img = new Image();

    function startSimulatedCamera() {

        function drawSim() {
            simCtx.fillStyle = '#2c2c2e'; simCtx.fillRect(0, 0, simCanvas.width, simCanvas.height);
            simCtx.save(); simCtx.translate(simCanvas.width / 2, simCanvas.height / 2); simCtx.rotate(angle);
            simCtx.fillStyle = '#3a3a3c'; simCtx.fillRect(-300, -300, 600, 600);
            simCtx.fillStyle = '#007AFF'; simCtx.fillRect(-50, -50, 100, 100);
            simCtx.restore(); angle += 0.01;
            requestAnimationFrame(drawSim);
        }

    // ==========================================
    // 🗺️ 平面圖引擎 (外圍引線排版)
    // ==========================================
    function getDistance(touches) {
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function handleMapTouchStart(e) {
        e.preventDefault();
        if (e.touches.length === 1) {
            isMapDragging = true;
            mapStartX = e.touches[0].clientX - mapPanX;
            mapStartY = e.touches[0].clientY - mapPanY;
        } else if (e.touches.length === 2) {
            isMapDragging = false;
            initialPinchDist = getDistance(e.touches);
            initialZoom = mapZoom;
        }
    }

    function handleMapTouchMove(e) {
        e.preventDefault();
        if (e.touches.length === 1 && isMapDragging) {
            mapPanX = e.touches[0].clientX - mapStartX;
            mapPanY = e.touches[0].clientY - mapStartY;
            renderMap();
        } else if (e.touches.length === 2 && initialPinchDist) {
            const newDist = getDistance(e.touches);
            mapZoom = initialZoom * (newDist / initialPinchDist);
            if (mapZoom < 0.5) mapZoom = 0.5;
            if (mapZoom > 5) mapZoom = 5;
            renderMap();
        }
    }

    function handleMapTouchEnd(e) {
        if (e.touches.length < 2) initialPinchDist = null;
        if (e.touches.length === 0) isMapDragging = false;
    }

    function handleMapWheel(e) {
        e.preventDefault();
        const zoomAmount = e.deltaY * -0.001;
        mapZoom += zoomAmount;
        if (mapZoom < 0.5) mapZoom = 0.5;
        if (mapZoom > 5) mapZoom = 5;
        renderMap();
    }

        let floors = [...new Set(inspectionRecords.map(r => r.floor).filter(f => f && f !== '-'))].sort();

            opt.value = f; opt.innerText = f;

    async function renderMap() {
        const cvs = document.getElementById('mapCanvas');
        if(!cvs) return;
        const rect = cvs.parentElement.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        cvs.width = rect.width * dpr; cvs.height = rect.height * dpr;
        
        const theme = document.body.classList.contains('light-theme') ? 'light' : 'dark';
        const selectedFloor = document.getElementById('mapFloorSelector').value;
        
        await drawMapOnCanvas(cvs, selectedFloor, dpr, theme);
    }

    // 核心繪製邏輯
    async function drawMapOnCanvas(cvs, selectedFloor, dpr, theme) {
        const ctx = cvs.getContext('2d');
        ctx.clearRect(0, 0, cvs.width, cvs.height);

        const isLight = theme.includes('light');
        const isExport = theme.includes('export');
        
        ctx.fillStyle = isLight ? '#ffffff' : '#111111';
        ctx.fillRect(0, 0, cvs.width, cvs.height);

        const gridLineColor = isLight ? 'rgba(0, 0, 0, 0.15)' : 'rgba(255, 255, 255, 0.15)';
        const columnColor = isLight ? 'rgba(0, 0, 0, 0.4)' : 'rgba(255, 255, 255, 0.6)';
        const axisTextColor = isLight ? '#007AFF' : '#FFD60A';

        const customSpan = parseFloat(document.getElementById('mapSpan').value) || 11;
        const customColSize = parseFloat(document.getElementById('mapColSize').value) || 1;
        
        let points = [];
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;

        inspectionRecords.forEach((r, i) => {
            if (selectedFloor !== 'all' && r.floor !== selectedFloor) return;
            let parts = r.axis.split('/');
            if(parts.length === 2) {
                let eng = parts[0].trim(); let num = parseFloat(parts[1].trim());
                if(eng && eng !== '-' && !isNaN(num) && num > 0) {
                    let y = 0;
                    for(let c=0; c<eng.length; c++) { y = y * 26 + (eng.charCodeAt(c) - 64); }
                    if (y > 0) {
                        points.push({ x: num, y: y, rm: r.rm, img: r.img, num: i + 1 });
                        if(num < minX) minX = num; if(num > maxX) maxX = num;
                        if(y < minY) minY = y; if(y > maxY) maxY = y;
                    }
                }
            }
        });

        if(points.length === 0) {
            ctx.fillStyle = '#8e8e93'; ctx.font = `${20 * dpr}px "微軟正黑體", sans-serif`; ctx.textAlign = 'center';
            ctx.fillText(i18n[sysLang.value].noMapData, cvs.width/2, cvs.height/2);
            return;
        }

        minX = Math.max(1, Math.floor(minX) - 1); maxX = Math.ceil(maxX) + 1;
        minY = Math.max(1, Math.floor(minY) - 1); maxY = Math.ceil(maxY) + 1;
        let gridW = maxX - minX; if(gridW === 0) gridW = 2;
        let gridH = maxY - minY; if(gridH === 0) gridH = 2;

        // 🚀 關鍵更新：將邊距拉大，預留空間給外部照片
        const pad = 200 * dpr; 
        const drawW = cvs.width - pad * 2, drawH = cvs.height - pad * 2;
        const baseScale = Math.min(drawW / gridW, drawH / gridH); 
        
        let z = isExport ? 1 : mapZoom;
        let px = isExport ? 0 : mapPanX;
        let py = isExport ? 0 : mapPanY;

        ctx.save();
        ctx.translate(cvs.width/2 + px * dpr, cvs.height/2 + py * dpr);
        ctx.scale(z, z);
        ctx.translate(-cvs.width/2, -cvs.height/2);

        const cx = cvs.width / 2 - (gridW * baseScale) / 2;
        const cy = cvs.height / 2 - (gridH * baseScale) / 2;

        function getScreenPt(x, y) { return { sx: cx + (x - minX) * baseScale, sy: cy + (y - minY) * baseScale }; }

        // 1. 畫網格
        ctx.strokeStyle = gridLineColor; ctx.lineWidth = (2 * dpr) / z; ctx.beginPath();
        for(let x = Math.floor(minX); x <= Math.ceil(maxX); x++) {
            let p1 = getScreenPt(x, minY); let p2 = getScreenPt(x, maxY);
            ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy);
        }
        for(let y = Math.floor(minY); y <= Math.ceil(maxY); y++) {
            let p1 = getScreenPt(minX, y); let p2 = getScreenPt(maxX, y);
            ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy);
        }
        ctx.stroke();

        // 2. 畫柱子與座標
        let colSizeRender = baseScale * (customColSize / customSpan); 
        ctx.fillStyle = columnColor;
        for(let x = Math.floor(minX); x <= Math.ceil(maxX); x++) {
            for(let y = Math.floor(minY); y <= Math.ceil(maxY); y++) {
                let p = getScreenPt(x, y);
                ctx.fillRect(p.sx - colSizeRender/2, p.sy - colSizeRender/2, colSizeRender, colSizeRender);
                
                ctx.font = `bold ${(14 * dpr)/z}px sans-serif`;
                if(y === Math.floor(minY)) {
                    ctx.fillStyle = axisTextColor; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                    ctx.fillText(x.toString(), p.sx, p.sy - (15 * dpr)/z);
                }
                if(x === Math.floor(minX)) {
                    ctx.fillStyle = axisTextColor; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
                    let letter = "", tempY = y;
                    while(tempY > 0) {
                        let rem = (tempY - 1) % 26; letter = String.fromCharCode(65 + rem) + letter; tempY = Math.floor((tempY - 1) / 26);
                    }
                    ctx.fillText(letter, p.sx - (15 * dpr)/z, p.sy);
                }
                ctx.fillStyle = columnColor;
            }
        }

        // 3. 預先載入影像
        for (let pt of points) {
            pt.imgObj = await loadImageAsync(pt.img);
            pt.screen = getScreenPt(pt.x, pt.y);
        }

        // 4. 🚀 智慧螺旋排版 (將圖片推向網格外部)
        const imgW = 80 * dpr / z; 
        const imgH = 60 * dpr / z;
        const boxes = [];
        
        // 定義平面圖的絕對網格範圍 (含一點緩衝)
        const gridBox = {
            x: cx - (30 * dpr / z),
            y: cy - (30 * dpr / z),
            w: (gridW * baseScale) + (60 * dpr / z),
            h: (gridH * baseScale) + (60 * dpr / z)
        };

        function checkCollision(box) {
            // 避免壓到平面圖網格
            if (box.x < gridBox.x + gridBox.w &&
                box.x + box.w > gridBox.x &&
                box.y < gridBox.y + gridBox.h &&
                box.y + box.h > gridBox.y) {
                return true;
            }
            // 避免照片互相重疊
            for(let b of boxes) {
                if (box.x < b.x + b.w + (15*dpr/z) &&
                    box.x + box.w + (15*dpr/z) > b.x &&
                    box.y < b.y + b.h + (30*dpr/z) && 
                    box.y + box.h + (15*dpr/z) > b.y) {
                    return true;
                }
            }
            return false;
        }

        for (let pt of points) {
            let r = 0; // 從原點開始向外探索
            let angle = 0;
            let placed = false;
            let bestBox = null;
            let spiralStep = 8 * dpr / z; 

            while (!placed && r < 5000 * dpr) {
                let tx = pt.screen.sx + r * Math.cos(angle);
                let ty = pt.screen.sy + r * Math.sin(angle);
                let box = {x: tx - imgW/2, y: ty - imgH/2, w: imgW, h: imgH};
                
                if (!checkCollision(box)) { 
                    bestBox = box; 
                    placed = true; 
                }
                angle += 0.5; 
                r += spiralStep;
            }

            if (bestBox) {
                boxes.push(bestBox);
                
                // 畫引線 (紅色、微透明)
                ctx.beginPath();
                ctx.moveTo(pt.screen.sx, pt.screen.sy);
                ctx.lineTo(bestBox.x + bestBox.w/2, bestBox.y + bestBox.h/2);
                ctx.strokeStyle = 'rgba(255, 59, 48, 0.8)';
                ctx.lineWidth = 1.5 * dpr / z;
                ctx.stroke();

                // 畫中心缺失紅點
                ctx.beginPath(); ctx.arc(pt.screen.sx, pt.screen.sy, (5 * dpr)/z, 0, Math.PI * 2);
                ctx.fillStyle = '#FF3B30'; ctx.fill();
                ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = (1.5 * dpr)/z; ctx.stroke();

                // 畫照片底框
                ctx.fillStyle = '#FF3B30';
                ctx.fillRect(bestBox.x - (2*dpr/z), bestBox.y - (2*dpr/z), bestBox.w + (4*dpr/z), bestBox.h + (4*dpr/z));

                // 畫照片縮圖
                if (pt.imgObj) {
                    ctx.drawImage(pt.imgObj, bestBox.x, bestBox.y, bestBox.w, bestBox.h);
                } else {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(bestBox.x, bestBox.y, bestBox.w, bestBox.h);
                }

                // 畫編號標籤
                const labelH = 14 * dpr / z;
                ctx.fillStyle = '#FF3B30';
                ctx.fillRect(bestBox.x - (2*dpr/z), bestBox.y - labelH - (2*dpr/z), bestBox.w + (4*dpr/z), labelH + (2*dpr/z));
                ctx.fillStyle = '#FFFFFF';
                ctx.font = `bold ${(11 * dpr)/z}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(`No.${pt.num}`, bestBox.x + bestBox.w/2, bestBox.y - labelH);
            }
        }
        ctx.restore();
    }

    function updateWatermarkPreview() {
        const lang = sysLang.value, txt = i18n[lang], fl = posFloor.value.trim(), num = posNum.value.trim(), eng = posEng.value.trim(), rm = remarkInput.value.trim(), user = userName.value.trim();

    document.getElementById('zoomSlider').addEventListener('input', e => { currentZoom = e.target.value; video.style.transform = `scale(${currentZoom})`; });

    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        var words = text.split('  '); 
        if(words.length === 1) words = text.split(' ');
        var line = ''; var currentY = y;
        for (var n = 0; n < words.length; n++) {
            var testLine = line + words[n] + '  ';
            var metrics = context.measureText(testLine);
            if (metrics.width > maxWidth && n > 0) {
                context.fillText(line, x, currentY); line = words[n] + '  '; currentY += lineHeight;
            } else { line = testLine; }
        }
        context.fillText(line, x, currentY);
        return currentY + lineHeight;
    }

    function takePicture() {
        if (!video.videoWidth) return;
        const fl = posFloor.value.trim(), num = posNum.value.trim(), eng = posEng.value.trim(), rm = remarkInput.value.trim(), user = userName.value.trim();
        if (!fl && !num && !eng) if(!confirm(i18n[sysLang.value].confirmNoPos)) return;

        canvas.width = 1024; canvas.height = 768;
        const targetAspect = 1024 / 768, zw = video.videoWidth / currentZoom, zh = video.videoHeight / currentZoom;
        const zx = (video.videoWidth - zw) / 2, zy = (video.videoHeight - zh) / 2;
        let sW, sH, sX, sY;
        if (zw / zh > targetAspect) { sH = zh; sW = sH * targetAspect; sX = zx + (zw - sW) / 2; sY = zy; }
        else { sW = zw; sH = sW / targetAspect; sX = zx; sY = zy + (zh - sH) / 2; }
        ctx.drawImage(video, sX, sY, sW, sH, 0, 0, canvas.width, canvas.height);

        const lang = sysLang.value, txt = i18n[lang];
        let floorStr = fl ? `L${fl}` : "", axisStr = (eng || num) ? `${eng || "-"}/${num || "-"}` : "";
        let dirText = currentDirKey === "none" ? "" : txt['dir' + currentDirKey.charAt(0).toUpperCase() + currentDirKey.slice(1)];
        let timeStr = new Date().toLocaleString();
        if (user && showUserInWM.checked) timeStr += `  (${user})`;

        const activeSize = wmSize ? parseFloat(wmSize.value) : 1.0;
        const activeColor = wmColor ? wmColor.value : '#FFD60A';
        const activePos = wmPosition ? wmPosition.value : 'bottom';

        const ufs = Math.floor(canvas.width / 30) * activeSize;
        const margin = canvas.width * 0.02;
        const maxWidth = canvas.width - (margin * 2);
        const lineH = ufs * 1.2;

        ctx.font = `bold ${ufs}px "微軟正黑體", sans-serif`;
        const infoFullText = [floorStr, axisStr, dirText, rm].filter(Boolean).join('  ');
        
        let testLines = 1, words = infoFullText.split('  '), line = '';
        for(let n=0; n<words.length; n++){
            let testLine = line + words[n] + '  ';
            if(ctx.measureText(testLine).width > maxWidth && n > 0){ testLines++; line = words[n] + '  '; } else { line = testLine; }
        }
        
        const totalBoxHeight = (testLines * lineH) + (ufs * 1.0);
        const boxY = activePos === "top" ? 0 : canvas.height - totalBoxHeight;

        ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(0, boxY, canvas.width, totalBoxHeight);
        
        ctx.fillStyle = activeColor;
        let nextY = wrapText(ctx, infoFullText, margin, boxY + ufs, maxWidth, lineH);
        
        ctx.font = `normal ${ufs * 0.6}px "微軟正黑體", sans-serif`;
        ctx.fillStyle = "white";
        ctx.fillText(timeStr, margin, nextY - (lineH * 0.3));

        const sequence = inspectionRecords.length + 1;
        let locForFile = [floorStr, axisStr.replace(/\//g, '-')].filter(Boolean).join(' ');
        const fileName = `${locForFile}_${dirText}_${rm}_${user}_${sequence}.jpg`.replace(/_none_/g, '_').replace(/_+/g, '_').replace(/^_/, '');

        const imgData = canvas.toDataURL('image/jpeg', 0.85);
        const link = document.createElement('a'); link.download = fileName; link.href = imgData; link.click();
        saveRecordToDB({ floor: floorStr, axis: axisStr, dir: dirText, rm: rm, user: user, time: timeStr, img: imgData });

        const vc = document.querySelector('.video-container'); vc.style.background = 'white'; video.style.opacity = '0.2';
        setTimeout(() => { vc.style.background = '#111'; video.style.opacity = '1'; }, 150);
    }

    function updateRecordUI() { 
        const lang = sysLang.value, txt = i18n[lang];
        exportBtn.innerText = `PDF (${inspectionRecords.length})`; 
        exportBtn.disabled = inspectionRecords.length === 0; 
        exportBtnExcel.innerText = `${txt.uiBtnExportExcel} (${inspectionRecords.length})`;
        exportBtnExcel.disabled = inspectionRecords.length === 0;
        btnUndo.disabled = inspectionRecords.length === 0;
    }

    async function exportTrueExcel() {
        if (inspectionRecords.length === 0) return;
        const txt = i18n[sysLang.value];
        
        const originalBtnText = exportBtnExcel.innerText;
        exportBtnExcel.innerText = txt.ptrLoading;
        exportBtnExcel.disabled = true;

        try {
            const workbook = new ExcelJS.Workbook();
            workbook.creator = 'RTDC Lincy';
            
            const sheet = workbook.addWorksheet('巡察報告 Report');
            sheet.columns = [
                { header: txt.colNo, key: 'no', width: 8 },
                { header: txt.colImg, key: 'img', width: 35 }, 
                { header: txt.colFloor, key: 'floor', width: 12 },
                { header: txt.colAxis, key: 'axis', width: 15 },
                { header: txt.colDir, key: 'dir', width: 10 },
                { header: txt.colUser, key: 'user', width: 15 },
                { header: txt.colRemark, key: 'rm', width: 30 },
                { header: txt.colTime, key: 'time', width: 22 }
            ];

            sheet.getRow(1).font = { name: '微軟正黑體', bold: true, size: 14, color: { argb: 'FFFFFFFF' } };
            sheet.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF007AFF' } };
            sheet.getRow(1).alignment = { vertical: 'middle', horizontal: 'center' };
            sheet.getRow(1).height = 30;

            for (let i = 0; i < inspectionRecords.length; i++) {
                const r = inspectionRecords[i];
                const rowIndex = i + 2;
                sheet.addRow({ no: i + 1, floor: r.floor, axis: r.axis, dir: r.dir, user: r.user, rm: r.rm, time: r.time });
                const row = sheet.getRow(rowIndex);
                row.height = 120;
                row.font = { name: '微軟正黑體', size: 12 };
                row.alignment = { vertical: 'middle', horizontal: 'center', wrapText: true };
                const imageId = workbook.addImage({ base64: r.img, extension: 'jpeg' });
                sheet.addImage(imageId, { tl: { col: 1, row: rowIndex - 1 }, ext: { width: 200, height: 150 }, editAs: 'oneCell' });
            }

            // --- 🚀 Excel 自動鑲嵌各樓層平面圖 ---
            let floors = [...new Set(inspectionRecords.map(r => r.floor).filter(f => f && f !== '-'))].sort();
            if(floors.length === 0) floors.push('all');

            for (let f of floors) {
                const offCvs = document.createElement('canvas');
                offCvs.width = 2400; offCvs.height = 1800; // 高畫質渲染
                
                await drawMapOnCanvas(offCvs, f, 2, 'light_export'); // 強制白底匯出
                
                const mapDataUrl = offCvs.toDataURL('image/jpeg', 0.85);
                const safeName = f === 'all' ? txt.mapAllFloors : `L${f}`;
                const mapSheet = workbook.addWorksheet(`平面圖 - ${safeName}`.substring(0, 31)); 
                
                const mapImageId = workbook.addImage({ base64: mapDataUrl, extension: 'jpeg' });
                mapSheet.addImage(mapImageId, {
                    tl: { col: 0, row: 0 },
                    ext: { width: 1200, height: 900 }
                });
            }

            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `Inspection_Report_${new Date().getTime()}.xlsx`; a.click(); URL.revokeObjectURL(url);
            
            if(confirm(txt.alertExport)) clearDB();
        } catch(err) {
            console.error(err);
            alert("EXCEL 匯出失敗 / EXCEL Export Error");
        } finally {
            updateRecordUI();
        }
    }

    function exportPDF() {
        if (inspectionRecords.length === 0) return;
        const txt = i18n[sysLang.value];

        const container = document.createElement('div');
        container.style.padding = '20px';
        container.style.fontFamily = '"微軟正黑體", sans-serif';
        container.style.color = '#000';
        container.style.background = '#fff';
        container.style.position = 'absolute';
        container.style.left = '-9999px'; 
        container.style.width = '900px';  

        let html = `<h2 style="color: #333; border-bottom: 2px solid #007AFF; padding-bottom: 10px; display: inline-block;">${txt.reportTitle}</h2>`;
        html += `<p>${new Date().toLocaleString()}</p>`;
        html += `<table style="width:100%; border-collapse:collapse; margin-top:20px;">`;
        html += `<thead><tr>`;
        ['colNo', 'colImg', 'colFloor', 'colAxis', 'colDir', 'colUser', 'colRemark', 'colTime'].forEach(k => {
            html += `<th style="border:1px solid #ddd; padding:10px; background:#007AFF; color:white; font-size:14px;">${txt[k]}</th>`;
        });
        html += `</tr></thead><tbody>`;

        inspectionRecords.forEach((r, i) => {
            html += `<tr>
                <td style="border:1px solid #ddd; padding:10px; text-align:center;">${i+1}</td>
                <td style="border:1px solid #ddd; padding:10px; text-align:center;"><img src="${r.img}" style="max-width:200px; border-radius:4px;"></td>
                <td style="border:1px solid #ddd; padding:10px; text-align:center; font-weight:bold; color:#007AFF;">${r.floor}</td>
                <td style="border:1px solid #ddd; padding:10px; text-align:center; font-weight:bold; color:#d9534f;">${r.axis}</td>
                <td style="border:1px solid #ddd; padding:10px; text-align:center;">${r.dir}</td>
                <td style="border:1px solid #ddd; padding:10px; text-align:center;">${r.user}</td>
                <td style="border:1px solid #ddd; padding:10px; text-align:center; color:#e67e22; font-weight:bold;">${r.rm}</td>
                <td style="border:1px solid #ddd; padding:10px; text-align:center; font-size:12px;">${r.time}</td>
            </tr>`;
        });

        html += `</tbody></table>`;
        html += `<div style="margin-top:40px; padding-top:15px; border-top:1px solid #ddd; text-align:center; font-size:11px; color:#666; line-height:1.6;">
            <strong>潤泰集團 RUENTEX 潤弘精密工程事業股份有限公司</strong><br>
            RTDC Designed by LINCY V1.0 | E-mail: RT023078@mail.ruentex.com.tw
        </div>`;

        container.innerHTML = html;
        document.body.appendChild(container);

        const originalBtnText = exportBtn.innerText;
        exportBtn.innerText = txt.ptrLoading;
        exportBtn.disabled = true;

        const opt = {
            margin:       10,
            filename:     `Inspection_Report_${new Date().getTime()}.pdf`,
            image:        { type: 'jpeg', quality: 0.95 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(container).save().then(() => {
            document.body.removeChild(container);
            updateRecordUI(); 
            if(confirm(txt.alertExport)) clearDB();
        }).catch(err => {
            console.error(err);
            document.body.removeChild(container);
            updateRecordUI();
        });
    }
</script>
